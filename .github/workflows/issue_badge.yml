name: Issue Badge Workflow

on:
  repository_dispatch:
    types: [issue_badge]

permissions:
  contents: write
  id-token: write

jobs:
  validate_and_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4



      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0


      - name: Generate Badge JSON
        id: generate
        env:
          PAYLOAD_USER: ${{ github.event.client_payload.user }}
          PAYLOAD_BADGE_ID: ${{ github.event.client_payload.badge_id }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          PAYLOAD_ISSUER: ${{ github.event.client_payload.issuer }}
          PAYLOAD_LEVEL: ${{ github.event.client_payload.level }}
          PAYLOAD_PROOF_URL: ${{ github.event.client_payload.proof_url }}
          PAYLOAD_ATTEMPT_CODE: ${{ github.event.client_payload.attempt_code }}
        run: |
          node scripts/update_badge.js
          
      - name: Sign Badge with Cosign
        run: |
          USER_PAYLOAD="${{ github.event.client_payload.user }}"
          BADGE_ID_PAYLOAD="${{ github.event.client_payload.badge_id }}"
          BADGE_FILE="badges/${USER_PAYLOAD}/${BADGE_ID_PAYLOAD}.json"
          
          BADGE_GENERATED="${{ steps.generate.outputs.badge_generated }}"
          
          if [ "$BADGE_GENERATED" == "false" ] && [ -f "${BADGE_FILE}.bundle" ]; then
            echo "Badge version matches and bundle exists. Skipping re-signing."
          else
            echo "Generating fresh signature..."
            # Keyless sign the badge and output the bundle
            cosign sign-blob --yes --bundle "${BADGE_FILE}.bundle" "${BADGE_FILE}"
          fi
          
          # Calculate SHA256 and create query link
          SHA256_HASH=$(shasum -a 256 "${BADGE_FILE}" | awk '{print $1}')
          REKOR_URL="https://search.sigstore.dev/?hash=sha256%3A${SHA256_HASH}"
          
          # Add to GitHub Actions Summary
          echo "### ✅ Badge Issued Successfully" >> $GITHUB_STEP_SUMMARY
          echo "**User:** $USER_PAYLOAD" >> $GITHUB_STEP_SUMMARY
          echo "**Badge ID:** $BADGE_ID_PAYLOAD" >> $GITHUB_STEP_SUMMARY
          echo "**Rekor Verification Link:** [Search on Sigstore]($REKOR_URL)" >> $GITHUB_STEP_SUMMARY

      - name: Update BADGES.md Link
        run: |
          node scripts/generate_badges_md.js

      - name: Commit and Push Badge
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/ BADGES.md
          git commit -m "Issue badge and sigstore bundle for ${{ github.event.client_payload.user }} - ${{ github.event.client_payload.badge_id }}"
          git push
